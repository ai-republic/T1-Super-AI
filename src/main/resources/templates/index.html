<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1 Super AI - Agent Chat</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

    <!-- Marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <img th:src="@{/images/logo-t1-head-beige-background.png}" alt="T1 Super AI" class="app-logo-head">
                    <img th:src="@{/images/logo-t1-super-ai-text.png}" alt="T1 Super AI" class="app-logo-text">
                </h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="showConfigModal()">
                        <span class="icon">⚙️</span>
                        Configure
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <team-selector></team-selector>
                <div class="sidebar-header">
                    <h2>Agents</h2>
                    <button class="btn-icon-small" onclick="showCreateAgentModal()" title="New Agent">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <agent-selector></agent-selector>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <chat-component></chat-component>
            </main>
        </div>
    </div>

    <!-- Configuration Modal -->
    <div id="configModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configuration</h2>
                <button class="btn-close" onclick="closeConfigModal()">&times;</button>
            </div>
            <config-editor></config-editor>
        </div>
    </div>

    <!-- Character Editor Modal -->
    <div id="characterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Character Profile</h2>
                <button class="btn-close" onclick="closeCharacterModal()">&times;</button>
            </div>
            <character-editor></character-editor>
        </div>
    </div>

    <!-- Create Agent Modal -->
    <div id="createAgentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Agent</h2>
                <button class="btn-close" onclick="closeCreateAgentModal()">&times;</button>
            </div>
            <create-agent-form></create-agent-form>
        </div>
    </div>

    <!-- Add Team Modal -->
    <div id="addTeamModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Add Team</h2>
                <button class="btn-close" onclick="closeAddTeamModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding: 1.5rem;">
                <form id="addTeamForm" onsubmit="handleAddTeamSubmit(event)">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="newTeamNameInput" class="form-label" style="display: block; margin-bottom: 0.5rem;">
                            Team Name <span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="newTeamNameInput"
                            class="form-input"
                            placeholder="e.g., DevOps, Frontend, DataScience"
                            required
                            autocomplete="off"
                            style="width: 100%;"
                        >
                        <small class="form-hint" style="display: block; margin-top: 0.5rem;">Choose a name for your new team workspace</small>
                    </div>

                    <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                        <button type="button" class="btn btn-secondary" onclick="closeAddTeamModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Team</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Clone Agent Modal -->
    <div id="cloneAgentModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Clone Agent to Team</h2>
                <button class="btn-close" onclick="closeCloneAgentModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding: 1.5rem;">
                <form id="cloneAgentForm" onsubmit="handleCloneAgentSubmit(event)">
                    <input type="hidden" id="cloneAgentName">
                    <input type="hidden" id="cloneSourceTeam">

                    <div class="form-group" style="margin-bottom: 1rem;">
                        <div style="padding: 0.75rem; background: var(--bg-secondary); border-radius: 6px; margin-bottom: 1.5rem;">
                            <strong>Agent:</strong> <span id="cloneAgentDisplayName"></span><br>
                            <strong>From Team:</strong> <span id="cloneSourceTeamDisplay"></span>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="cloneTargetTeam" class="form-label" style="display: block; margin-bottom: 0.5rem;">
                            Target Team <span class="required">*</span>
                        </label>
                        <select
                            id="cloneTargetTeam"
                            class="form-input"
                            required
                            style="width: 100%;"
                        >
                            <option value="">-- Select Team --</option>
                        </select>
                        <small class="form-hint" style="display: block; margin-top: 0.5rem;">Select the team to clone this agent to</small>
                    </div>

                    <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                        <button type="button" class="btn btn-secondary" onclick="closeCloneAgentModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Clone Agent</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Setup Wizard (shown on first run) -->
    <setup-wizard></setup-wizard>

    <!-- Web Components -->
    <script type="module" th:src="@{/components/agent-config-form.js}"></script>
    <script type="module" th:src="@{/components/chat-component.js}"></script>
    <script type="module" th:src="@{/components/team-selector.js}"></script>
    <script type="module" th:src="@{/components/agent-selector.js}"></script>
    <script type="module" th:src="@{/components/config-editor.js}"></script>
    <script type="module" th:src="@{/components/character-editor.js}"></script>
    <script type="module" th:src="@{/components/create-agent-form.js}"></script>
    <script type="module" th:src="@{/components/setup-wizard.js}"></script>

    <!-- Utilities -->
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
