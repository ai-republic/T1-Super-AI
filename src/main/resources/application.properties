# Spring Application Configuration
spring.application.name=t1-super-ai
spring.main.banner-mode=off
spring.main.web-application-type=servlet
server.port=8080

# Logging Configuration
logging.level.root=WARN
logging.level.com.airepublic.t1=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.coyote=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ================================================================================
# Spring AI Configuration - MANUAL INITIALIZATION ONLY
# ================================================================================
# Spring AI auto-configuration is DISABLED for this application.
# Chat models are created manually after reading user configuration from:
# ~/.ai-super-agent/config.json
#
# On first run, the configuration wizard will guide you through:
# - Selecting LLM providers (OpenAI, Anthropic, Ollama)
# - Entering API keys
# - Choosing models
# - Configuring system permissions
#
# NO API KEYS ARE REQUIRED IN THIS FILE.
# All configuration is managed through ~/.ai-super-agent/config.json
# ================================================================================

# Spring AI Retry and Timeout Settings
spring.ai.retry.max-attempts=3
spring.ai.retry.on-client-errors=false
spring.ai.retry.initial-interval=2000
spring.ai.retry.multiplier=2.0
spring.ai.retry.max-interval=10000

# HTTP Client Timeout Settings (in seconds)
# These apply to the underlying HTTP client used by Spring AI
spring.http.client.connect-timeout=300
spring.http.client.read-timeout=600

# Auto Model Selection Configuration
# Timeout for LLM classification in milliseconds (increased for Ollama support)
ai-agent.auto-model.classification-timeout=300000

# ================================================================================
# Vector Store Configuration
# ================================================================================
# Vector store enables semantic search of conversation history.
#
# Options:
# 1. SimpleVectorStore (default) - In-memory with JSON file persistence
# 2. Redis with embedded Redis - For development/testing
# 3. Redis with external Redis Stack - For production
#
# To enable vector store:
#    spring.ai.vectorstore.enabled=true
#    spring.ai.vectorstore.type=simple (or redis)
#
# For Redis:
#    spring.ai.vectorstore.type=redis
#    spring.ai.vectorstore.redis.embedded.enabled=true (for embedded)
#    spring.ai.vectorstore.redis.host=localhost (for external)
#    spring.ai.vectorstore.redis.port=6379 (for external)
# ================================================================================

# Enable/disable vector store (default: false)
spring.ai.vectorstore.enabled=false

# Vector store type: simple or redis
spring.ai.vectorstore.type=simple

# Embedded Redis configuration (for development)
spring.ai.vectorstore.redis.embedded.enabled=false
spring.ai.vectorstore.redis.embedded.port=6370

# External Redis configuration (for production)
spring.ai.vectorstore.redis.host=localhost
spring.ai.vectorstore.redis.port=6379

# ================================================================================
# OpenAPI / Swagger UI Configuration
# ================================================================================
# Swagger UI will be accessible at: http://localhost:8080/swagger-ui.html
# OpenAPI JSON will be accessible at: http://localhost:8080/v3/api-docs

# Enable OpenAPI documentation
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Enable Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Swagger UI configuration
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true

# Group all endpoints
springdoc.group-configs[0].group=agents
springdoc.group-configs[0].display-name=Agent Management APIs
springdoc.group-configs[0].paths-to-match=/api/v1/agents/**

# Show request/response examples
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
