# Spring Application Configuration
spring.application.name=t1-super-ai
spring.main.banner-mode=off
spring.main.web-application-type=servlet
server.port=8082

# Logging Configuration - File only (see logback-spring.xml)
# All logs are written to logs/application.log
# Console output is disabled

# ================================================================================
# Spring AI Configuration - MANUAL INITIALIZATION ONLY
# ================================================================================
# Spring AI auto-configuration is DISABLED for this application.
# Chat models are created manually after reading user configuration from:
# ~/.ai-super-agent/config.json
#
# On first run, the configuration wizard will guide you through:
# - Selecting LLM providers (OpenAI, Anthropic, Ollama)
# - Entering API keys
# - Choosing models
# - Configuring system permissions
#
# NO API KEYS ARE REQUIRED IN THIS FILE.
# All configuration is managed through ~/.ai-super-agent/config.json
# ================================================================================

# Spring AI Retry and Timeout Settings
spring.ai.retry.max-attempts=3
spring.ai.retry.on-client-errors=false
spring.ai.retry.initial-interval=2000
spring.ai.retry.multiplier=2.0
spring.ai.retry.max-interval=10000

# HTTP Client Timeout Settings (in seconds)
# These apply to the underlying HTTP client used by Spring AI
spring.http.client.connect-timeout=300
spring.http.client.read-timeout=600

# Auto Model Selection Configuration
# Timeout for LLM classification in milliseconds (increased for Ollama support)
ai-agent.auto-model.classification-timeout=300000

# ================================================================================
# Vector Store Configuration - Airepublic Filesystem VectorStore
# ================================================================================
# Vector store enables semantic search of conversation history using embeddings.
# Uses the airepublic vectorstore library with Spring AI integration.
#
# When enabled:
# - Uses SpringAIVectorStore adapter (implements org.springframework.ai.vectorstore.VectorStore)
# - Per-agent vector collections with agent-specific storage
# - High-performance HNSW index for fast similarity search
# - Automatic persistence to disk
#
# Configuration:
# - Storage path: Where vector data is stored (per-agent folders created automatically)
# - Collection name: Name for the default collection
# - Dimension: Vector dimension (must match embedding model)
#   - OpenAI text-embedding-3-small: 1536
#   - Ollama nomic-embed-text: 768
# - Metric: Distance metric (cosine, l2, inner_product)
#
# Embeddings are generated using the default LLM provider from config.json
# ================================================================================

# Enable/disable vector store (default: false)
spring.ai.vectorstore.enabled=true

# Filesystem VectorStore Configuration
# Storage path for vector data (agent-specific subdirectories created automatically)
spring.ai.vectorstore.filesystem.storage-path=${user.home}/.t1-super-ai/agents

# Default collection name
spring.ai.vectorstore.filesystem.collection-name=memory

# Vector dimension (must match embedding model)
spring.ai.vectorstore.filesystem.dimension=1536

# Distance metric: cosine, l2, or inner_product
spring.ai.vectorstore.filesystem.metric=cosine

# HNSW Index Parameters (optional tuning)
# spring.ai.vectorstore.filesystem.index-m=16
# spring.ai.vectorstore.filesystem.index-ef-construction=200
# spring.ai.vectorstore.filesystem.index-ef-search=100

# ================================================================================
# OpenAPI / Swagger UI Configuration
# ================================================================================
# Swagger UI will be accessible at: http://localhost:8080/swagger-ui.html
# OpenAPI JSON will be accessible at: http://localhost:8080/v3/api-docs

# Enable OpenAPI documentation
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Enable Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Swagger UI configuration
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true

# Group all endpoints
springdoc.group-configs[0].group=agents
springdoc.group-configs[0].display-name=Agent Management APIs
springdoc.group-configs[0].paths-to-match=/api/v1/agents/**

# Show request/response examples
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
